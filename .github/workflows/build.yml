name: mbest700-Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      
      # wrapper dosyası yoksa direkt gradle komutuyla derle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: gradle build  # ./gradlew yerine direkt gradle yazıyoruz
      
      - uses: actions/upload-artifact@v4
        with:
          name: OptiBest-mbest700-JAR
          path: build/libs/*.jar
          
